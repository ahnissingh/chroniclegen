<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${story.title}">FableForge Story</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container" id="fable-container">
        <header class="header">
            <div class="logo">FABLE<span>FORGE</span></div>
            <p class="subtitle">AI-Crafted Whispers of Wisdom</p>
        </header>

        <article class="card story-card">
            <h1 class="story-title" th:text="${story.title}">The Tortoise and the Hare</h1>
            
            <div class="divider">
                <span class="star">&#10022;</span>
            </div>

            <div class="story-content">
                <p th:each="paragraph : ${#strings.arraySplit(story.content, '\n')}" 
                   th:text="${paragraph}"
                   th:if="${!#strings.isEmpty(paragraph)}">
                   Once upon a time...
                </p>
            </div>

            <div class="moral-container">
                <div class="moral-tag">Moral of the Story</div>
                <blockquote class="story-moral" th:text="${story.moral}">
                    Slow and steady wins the race.
                </blockquote>
            </div>
        </article>

        <footer class="footer">
            <p>Generated by FableForge &copy; 2026. Built with Java, Thymeleaf, and Jackson.</p>
        </footer>
    </main>
</body>
</html>
